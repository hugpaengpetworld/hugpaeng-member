<script>
  const LIFF_ID = "2010307463-T9kVRpcj";
  const API_URL = "https://script.google.com/macros/s/AKfycbzI4JBgyC74yfJoRhGh068wmxFo6abwmly9IqngiN0_FnXCMTKmVCAodaLdfHq1WufUJQ/exec";
  let currentLineUserId = "";

  function getLevelInfo(point) {
    point = Number(String(point).replace(/,/g, "")) || 0;

    if (point >= 3000) {
      return {
        level: "PLATINIUM",
        nextLevel: "สูงสุดแล้ว",
        remain: 0,
        percent: 100,
        color: "#1f1f1f"
      };
    }

    if (point >= 1500) {
      return {
        level: "GOLD",
        nextLevel: "PLATINIUM",
        remain: 3000 - point,
        percent: (point / 3000) * 100,
        color: "#d9931f"
      };
    }

    if (point >= 500) {
      return {
        level: "SILVER",
        nextLevel: "GOLD",
        remain: 1500 - point,
        percent: (point / 1500) * 100,
        color: "#9ca3af"
      };
    }

    return {
      level: "BRONZE",
      nextLevel: "SILVER",
      remain: 500 - point,
      percent: (point / 500) * 100,
      color: "#a16207"
    };
  }

  function jsonp(url) {
    return new Promise((resolve, reject) => {
      const callbackName = "jsonp_callback_" + Math.round(100000 * Math.random());
      const script = document.createElement("script");

      window[callbackName] = function(data) {
        delete window[callbackName];
        document.body.removeChild(script);
        resolve(data);
      };

      script.src = url + "&callback=" + callbackName;
      script.onerror = function() {
        reject(new Error("ไม่สามารถเชื่อมต่อ API ได้"));
      };

      document.body.appendChild(script);
    });
  }

  async function main() {
    try {
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const profile = await liff.getProfile();
      currentLineUserId = profile.userId;

      const data = await jsonp(
        API_URL + "?action=getByLineUserId&lineUserId=" + encodeURIComponent(currentLineUserId)
      );

      if (data && data.found) {
        showMember(data);
      } else {
        showBindForm();
      }

    } catch (err) {
      document.getElementById("result").innerHTML =
        '<div class="error">เกิดข้อผิดพลาด: ' + err.message + "</div>";
    }
  }

  function showBindForm() {
    document.getElementById("result").innerHTML = `
      <div class="info-box">
        <h3 style="text-align:center;">ผูกข้อมูลสมาชิกครั้งแรก</h3>
        <p style="text-align:center;">กรอกเบอร์โทรศัพท์ที่ใช้สมัครสมาชิก</p>
        <input id="phone" type="tel" placeholder="เช่น 0925424461">
        <button onclick="bindMember()">ยืนยันข้อมูลสมาชิก</button>
      </div>
    `;
  }

  async function bindMember() {
    const phone = document.getElementById("phone").value.trim();

    if (!phone) {
      document.getElementById("result").innerHTML =
        '<div class="error">กรุณากรอกเบอร์โทรศัพท์</div>';
      setTimeout(showBindForm, 1200);
      return;
    }

    document.getElementById("result").innerHTML =
      '<div class="loading">กำลังผูกข้อมูลสมาชิก...</div>';

    const data = await jsonp(
      API_URL +
      "?action=bindByPhone&phone=" + encodeURIComponent(phone) +
      "&lineUserId=" + encodeURIComponent(currentLineUserId)
    );

    if (data && data.found) {
      showMember(data);
    } else {
      document.getElementById("result").innerHTML =
        '<div class="error">' + (data.error || "ไม่พบข้อมูลสมาชิก") + "</div>";
      setTimeout(showBindForm, 1800);
    }
  }

  function showMember(data) {
    const point = Number(String(data.point).replace(/,/g, "")) || 0;
    const levelInfo = getLevelInfo(point);
    const qrData = encodeURIComponent(data.memberId || "");
    const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" + qrData;

    const nextText = levelInfo.remain === 0
      ? "คุณอยู่ในระดับสูงสุดแล้ว"
      : `สะสมคะแนนอีก ${levelInfo.remain.toLocaleString()} คะแนน เพื่อปรับระดับเป็น ${levelInfo.nextLevel}`;

    document.getElementById("result").innerHTML = `
      <div class="member-card" style="background:linear-gradient(160deg, ${levelInfo.color}, #063f2d);">
        <div class="card-title">DIGITAL MEMBER CARD</div>

        <div class="level">${levelInfo.level}</div>

        <div class="name">${data.name}</div>
        <div class="member-id">${data.memberId}</div>

        <div class="qr-box">
          <img src="${qrUrl}" alt="Member QR Code">
        </div>

        <div class="point">${point.toLocaleString()}</div>
        <div class="point-label">คะแนนสะสม</div>

        <div style="background:rgba(255,255,255,.18);border-radius:999px;height:12px;margin-top:14px;overflow:hidden;">
          <div style="width:${Math.min(levelInfo.percent,100)}%;height:100%;background:#d9931f;"></div>
        </div>

        <div style="font-size:13px;margin-top:10px;color:#fff8ea;">
          ${nextText}
        </div>
      </div>

      <div class="info-box">
        <div class="row"><span class="label">เบอร์โทร:</span> ${data.phone}</div>
        <div class="row"><span class="label">คูปอง:</span> ${data.coupon}</div>
        <div class="row"><span class="label">ยอดซื้อสะสม:</span> ${data.totalSpend} บาท</div>
        <div class="row"><span class="label">สถานะ:</span> ${data.status}</div>
      </div>
    `;
  }

  main();
</script>
