<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 18px;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #063f2d, #0b5a3f);
      color: #063f2d;
    }

    .wrap {
      max-width: 430px;
      margin: 0 auto;
    }

    .hero {
      background: #fff8ea;
      border-radius: 30px;
      padding: 22px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,.2);
    }

    h1 {
      margin: 0;
      font-size: 26px;
      color: #0b5a3f;
      letter-spacing: 1px;
    }

    .subtitle {
      color: #d9931f;
      font-weight: bold;
      margin-top: 8px;
      margin-bottom: 20px;
      font-size: 16px;
    }

    .member-card {
      background: linear-gradient(160deg, #0b5a3f, #063f2d);
      color: #fff8ea;
      border-radius: 26px;
      padding: 22px;
      text-align: center;
      box-shadow: inset 0 0 0 2px rgba(217,147,31,.45);
    }

    .card-title {
      color: #d9931f;
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .level {
      display: inline-block;
      background: #d9931f;
      color: white;
      padding: 9px 24px;
      border-radius: 999px;
      font-weight: bold;
      margin: 10px 0 16px;
      font-size: 16px;
    }

    .name {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .member-id {
      font-size: 17px;
      color: #ffe7b0;
      margin-bottom: 18px;
    }

    .qr-box {
      background: white;
      border-radius: 22px;
      padding: 16px;
      margin: 16px auto;
      width: 220px;
    }

    .qr-box img {
      width: 100%;
      display: block;
    }

    .point {
      font-size: 38px;
      font-weight: bold;
      color: #d9931f;
      margin: 14px 0 4px;
    }

    .point-label {
      font-size: 14px;
      color: #fff8ea;
      margin-bottom: 10px;
    }

    .info-box {
      margin-top: 18px;
      background: white;
      border-radius: 22px;
      padding: 18px;
      text-align: left;
    }

    .row {
      padding: 10px 0;
      border-bottom: 1px solid #f2eadc;
      font-size: 16px;
    }

    .row:last-child { border-bottom: none; }

    .label {
      font-weight: bold;
      color: #0b5a3f;
    }

    input {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: 1px solid #ddd;
      font-size: 18px;
      text-align: center;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: #d9931f;
      color: white;
      font-size: 18px;
      font-weight: bold;
    }

    .loading, .error {
      margin-top: 18px;
      padding: 16px;
      border-radius: 16px;
      font-weight: bold;
      text-align: center;
    }

    .loading {
      background: #eef7f2;
      color: #0b5a3f;
    }

    .error {
      background: #ffe5e5;
      color: #b00020;
    }

    .footer {
      text-align: center;
      color: #fff8ea;
      font-size: 12px;
      margin-top: 16px;
      opacity: .85;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="hero">
      <h1>🐾 HUGPAENG FAMILY</h1>
      <div class="subtitle">ดูแลด้วยหัวใจ และเติบโตไปพร้อมกัน</div>
      <div id="result" class="loading">กำลังเข้าสู่ระบบ LINE...</div>
    </div>
    <div class="footer">HUGPAENG PET WORLD</div>
  </div>

  <script>
    const LIFF_ID = "2010307463-T9kVRpcj";
    const API_URL = "https://script.google.com/macros/s/AKfycbzI4JBgyC74yfJoRhGh068wmxFo6abwmly9IqngiN0_FnXCMTKmVCAodaLdfHq1WufUJQ/exec";
    let currentLineUserId = "";

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = "jsonp_callback_" + Math.round(100000 * Math.random());
        const script = document.createElement("script");

        window[callbackName] = function(data) {
          delete window[callbackName];
          document.body.removeChild(script);
          resolve(data);
        };

        script.src = url + "&callback=" + callbackName;
        script.onerror = function() {
          reject(new Error("ไม่สามารถเชื่อมต่อ API ได้"));
        };

        document.body.appendChild(script);
      });
    }

    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        currentLineUserId = profile.userId;

        const data = await jsonp(
          API_URL + "?action=getByLineUserId&lineUserId=" + encodeURIComponent(currentLineUserId)
        );

        if (data && data.found) {
          showMember(data);
        } else {
          showBindForm();
        }

      } catch (err) {
        document.getElementById("result").innerHTML =
          '<div class="error">เกิดข้อผิดพลาด: ' + err.message + "</div>";
      }
    }

    function showBindForm() {
      document.getElementById("result").innerHTML = `
        <div class="info-box">
          <h3 style="text-align:center;">ผูกข้อมูลสมาชิกครั้งแรก</h3>
          <p style="text-align:center;">กรอกเบอร์โทรศัพท์ที่ใช้สมัครสมาชิก</p>
          <input id="phone" type="tel" placeholder="เช่น 0925424461">
          <button onclick="bindMember()">ยืนยันข้อมูลสมาชิก</button>
        </div>
      `;
    }

    async function bindMember() {
      const phone = document.getElementById("phone").value.trim();

      if (!phone) {
        document.getElementById("result").innerHTML =
          '<div class="error">กรุณากรอกเบอร์โทรศัพท์</div>';
        setTimeout(showBindForm, 1200);
        return;
      }

      document.getElementById("result").innerHTML =
        '<div class="loading">กำลังผูกข้อมูลสมาชิก...</div>';

      const data = await jsonp(
        API_URL +
        "?action=bindByPhone&phone=" + encodeURIComponent(phone) +
        "&lineUserId=" + encodeURIComponent(currentLineUserId)
      );

      if (data && data.found) {
        showMember(data);
      } else {
        document.getElementById("result").innerHTML =
          '<div class="error">' + (data.error || "ไม่พบข้อมูลสมาชิก") + "</div>";
        setTimeout(showBindForm, 1800);
      }
    }

    function showMember(data) {
      const qrData = encodeURIComponent(data.memberId || "");
      const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" + qrData;

      document.getElementById("result").innerHTML = `
        <div class="member-card">
          <div class="card-title">DIGITAL MEMBER CARD</div>
          <div class="level">${data.level}</div>
          <div class="name">${data.name}</div>
          <div class="member-id">${data.memberId}</div>

          <div class="qr-box">
            <img src="${qrUrl}" alt="Member QR Code">
          </div>

          <div class="point">${data.point}</div>
          <div class="point-label">คะแนนสะสม</div>
        </div>

        <div class="info-box">
          <div class="row"><span class="label">เบอร์โทร:</span> ${data.phone}</div>
          <div class="row"><span class="label">คูปอง:</span> ${data.coupon}</div>
          <div class="row"><span class="label">ยอดซื้อสะสม:</span> ${data.totalSpend} บาท</div>
          <div class="row"><span class="label">สถานะ:</span> ${data.status}</div>
        </div>
      `;
    }

    main();
  </script>
</body>
</html>
